services:
  postgres:
    image: postgres:16-alpine
    container_name: home-ledger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: home_ledger
      POSTGRES_USER: home_ledger_user
      POSTGRES_PASSWORD: home_ledger_password
    ports:
      - "5432:5432"
    volumes:
      - home_ledger_postgres_data:/var/lib/postgresql/data

volumes:
  home_ledger_postgres_data:
