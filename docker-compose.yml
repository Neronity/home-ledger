services:
  postgres:
    image: postgres:16-alpine
    container_name: home-ledger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-home_ledger}
      POSTGRES_USER: ${POSTGRES_USER:-home_ledger_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-home_ledger_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - home_ledger_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  home_ledger_postgres_data:
